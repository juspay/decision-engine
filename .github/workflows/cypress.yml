# Cypress E2E Tests
#
# This workflow runs Cypress tests in parallel across multiple jobs.
# The Decision Engine is built once and shared across all test jobs via
# Docker image artifact to avoid redundant builds.
#
# Architecture:
#   1. Build job: Build Decision Engine from PR source, save as artifact
#   2. Matrix jobs (parallel):
#      - Download the pre-built image
#      - Start API + dependencies via docker compose --profile postgres-local
#      - Build and serve UI from website/ directory (vite preview)
#      - Run single spec file in headless mode
#      - Upload screenshots on failure
#
# Caching layers:
#   - Docker BuildKit layers → GHA cache, scoped to head branch (PR) or ref name (push)
#     Fallback reads from the base branch so PRs warm-start from main's layers.
#   - npm global cache (~/.npm) → actions/setup-node built-in, keyed on both lock files
#   - Cypress binary (~/.cache/Cypress) → actions/cache, keyed on package-lock.json
#     Separate from ~/.npm because the binary (~200 MB) is not part of the registry cache.

name: Cypress E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  IMAGE_NAME: decision-engine-pg:local
  IMAGE_ARTIFACT: decision-engine-image

jobs:
  # ========================================================================
  # Build job: Compile Decision Engine once and share the image
  # ========================================================================
  build:
    name: Build Decision Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Build Decision Engine from PR source
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.postgres
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: |
            type=gha,scope=cypress-${{ github.head_ref || github.ref_name }}
            type=gha,scope=cypress-${{ github.base_ref || 'main' }}
          # Write to the head-branch scope so PR builds never overwrite the
          # main-branch cache. On a push to main github.head_ref is empty, so
          # github.ref_name ('main') is used — the main cache is updated then.
          cache-to: type=gha,scope=cypress-${{ github.head_ref || github.ref_name }},mode=max

      - name: Save Docker image to tar
        run: docker save ${{ env.IMAGE_NAME }} | gzip > ${{ env.IMAGE_ARTIFACT }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT }}
          path: ${{ env.IMAGE_ARTIFACT }}.tar.gz
          retention-days: 1

  # ========================================================================
  # Cypress test jobs: Run in parallel, each with own isolated stack
  # ========================================================================
  cypress:
    name: "cypress / ${{ matrix.spec }}"
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: euclid-rules-builder
            file: cypress/e2e/ui/euclid-rules-builder.cy.js
          - spec: euclid-rules-lifecycle
            file: cypress/e2e/ui/euclid-rules-lifecycle.cy.js
          - spec: euclid-rules-advanced
            file: cypress/e2e/ui/euclid-rules-advanced.cy.js
          - spec: volume-split-page
            file: cypress/e2e/ui/volume-split-page.cy.js
          - spec: dashboard-overview
            file: cypress/e2e/ui/dashboard-overview.cy.js
          - spec: auth-page
            file: cypress/e2e/ui/auth-page.cy.js
          - spec: debit-routing-page
            file: cypress/e2e/ui/debit-routing-page.cy.js
          - spec: decision-explorer
            file: cypress/e2e/ui/decision-explorer.cy.js
          - spec: payment-audit
            file: cypress/e2e/ui/payment-audit.cy.js
          - spec: analytics-page
            file: cypress/e2e/ui/analytics-page.cy.js

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT }}

      - name: Load Docker image
        run: gunzip -c ${{ env.IMAGE_ARTIFACT }}.tar.gz | docker load

      # Start services early so they come up while npm installs + UI build run.
      # docker compose up -d returns immediately; health checks wait later.
      - name: Start services (using pre-built image)
        run: |
          # Override config to use service names instead of host.docker.internal
          sed -i 's/host = "host.docker.internal"/host = "redis"/' config/docker-configuration.toml
          sed -i 's/pg_host = "postgresql"/pg_host = "postgresql"/' config/docker-configuration.toml
          docker compose --profile postgres-local up -d --no-build

      # ── npm caches ────────────────────────────────────────────────────────
      # actions/setup-node restores ~/.npm (the registry package cache).
      # Key is a hash of BOTH lock files so either change invalidates the cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            package-lock.json

      # The Cypress binary (~200 MB) lives in ~/.cache/Cypress and is NOT part
      # of ~/.npm. Without this cache every job downloads it from scratch.
      # restore-keys provides a fallback so a lock-file bump that doesn't change
      # the Cypress version still gets a partial hit; Cypress skips the download
      # if the binary is already present in ~/.cache/Cypress/<version>/.
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      # ── Install + build (runs while Docker services are starting up) ──────
      - name: Install UI deps
        run: npm ci
        working-directory: website

      - name: Install Cypress deps
        run: npm ci

      - name: Build UI
        run: npm run build
        working-directory: website
        env:
          VITE_API_BASE_PATH: http://localhost:8080/decision-engine-api

      # ── Wait for services (Docker has had ~2-3 min to start by now) ───────
      - name: Wait for API (basic health)
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:8080/health; do sleep 2; done'
          echo "✓ Basic health check passed"

      - name: Wait for API (ready check)
        run: |
          timeout 180 bash -c \
            'until curl -sf http://localhost:8080/health/ready; do sleep 3; done'
          echo "✓ Ready check passed"

      - name: Serve UI
        run: npx vite preview --port 5173 &
        working-directory: website

      - name: Wait for UI
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:5173; do sleep 2; done'

      # ── Run Cypress ───────────────────────────────────────────────────────
      - name: Run ${{ matrix.spec }}
        run: npx cypress run --spec "${{ matrix.file }}" --headless
        env:
          CYPRESS_API_BASE_URL: http://localhost:8080
          CYPRESS_UI_BASE_URL: http://localhost:5173
          CYPRESS_RUNTIME_MODE: ci

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.spec }}
          path: cypress/screenshots/
          retention-days: 7

      - name: Cleanup services
        if: always()
        run: docker compose --profile postgres-local down --volumes
