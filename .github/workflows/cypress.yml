# Cypress E2E Tests
#
# Single job: builds the Decision Engine, starts all services, runs all specs
# sequentially in one Cypress process.
#
# Caching layers:
#   - Docker BuildKit layers → GHA cache, scoped per branch (mode=max caches
#     all intermediate layers so Rust compilation is not re-run on unchanged code).
#   - npm global cache (~/.npm) → actions/setup-node, keyed on both lock files.
#   - Cypress binary (~/.cache/Cypress, ~200 MB) → actions/cache, separate from ~/.npm.

name: Cypress E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for GHA cache writes (cache-to: type=gha) and artifact uploads.
  actions: write

jobs:
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── Build Decision Engine ─────────────────────────────────────────────
      # mode=max caches every layer, including the Rust compilation layer,
      # so unchanged code is not recompiled on subsequent runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Decision Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.postgres
          tags: decision-engine-pg:local
          load: true
          build-args: BUILD_MODE=debug
          cache-from: |
            type=gha,scope=cypress-debug-${{ github.head_ref || github.ref_name }}
            type=gha,scope=cypress-debug-${{ github.base_ref || 'main' }}
          cache-to: type=gha,scope=cypress-debug-${{ github.head_ref || github.ref_name }},mode=max

      # ── Start services ────────────────────────────────────────────────────
      # Services start in the background while npm installs and UI build run.
      - name: Start services
        run: |
          # host.docker.internal doesn't resolve on Linux CI runners.
          sed -i 's/host = "host.docker.internal"/host = "redis"/' config/docker-configuration.toml
          docker compose --profile postgres-local up -d --no-build

      # ── npm + Cypress binary caches ───────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            package-lock.json

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      # ── Install UI + Cypress deps (runs while services are coming up) ──────
      - name: Install UI deps
        run: npm ci
        working-directory: website

      - name: Install Cypress deps
        run: npm ci

      # ── Wait for API ──────────────────────────────────────────────────────
      - name: Wait for API
        run: |
          timeout 180 bash -c \
            'until curl -sf http://localhost:8080/health/ready; do sleep 3; done' \
            || { echo "❌ API failed to become ready"; docker compose logs --tail=50; exit 1; }
          echo "✓ API ready"

      # ── Bash API tests ───────────────────────────────────────────────────
      - name: Auth integration tests
        run: bash scripts/test_auth.sh
        env:
          BASE_URL: http://localhost:8080
          ADMIN_SECRET: test_admin

      # ── Build UI (compile check only) ────────────────────────────────────
      # Catches missing imports and type errors (e.g. useRef not imported)
      # before Cypress starts. The built output is not used for serving —
      # the dev server below is used instead so BASE_URL stays '/' and
      # BrowserRouter's basename matches the paths Cypress visits.
      - name: Build UI
        run: npx vite build
        working-directory: website
        env:
          VITE_DASHBOARD_BASE_PATH: /

      # ── Start UI dev server ───────────────────────────────────────────────
      - name: Start UI dev server
        run: npx vite --port 5173 &
        working-directory: website

      - name: Wait for UI
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:5173; do sleep 2; done'

      # ── Run all Cypress specs (sequential) ───────────────────────────────
      - name: Run Cypress
        run: |
          npx cypress run \
            --spec "cypress/e2e/ui/**/*.cy.js,cypress/e2e/api/**/*.cy.js" \
            --headless
        env:
          CYPRESS_API_BASE_URL: http://localhost:8080
          CYPRESS_UI_BASE_URL: http://localhost:5173
          CYPRESS_RUNTIME_MODE: ci

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Cleanup services
        if: always()
        run: docker compose --profile postgres-local down --volumes
