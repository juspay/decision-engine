# Cypress E2E Tests
#
# Single job: builds the Decision Engine, starts all services, runs all specs.
#
# Caching layers:
#   - Docker BuildKit layers → GHA cache, scoped per branch.
#     load: true puts the image directly into the local Docker daemon —
#     no docker save / tar artifact / docker load round-trip needed.
#   - npm global cache (~/.npm) → actions/setup-node, keyed on both lock files.
#   - Cypress binary (~/.cache/Cypress, ~200 MB) → actions/cache, separate from ~/.npm.

name: Cypress E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for GHA cache writes (cache-to: type=gha) and artifact uploads.
  actions: write

jobs:
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── Build Decision Engine ─────────────────────────────────────────────
      # BuildKit GHA cache means only changed layers are rebuilt.
      # load: true puts the image straight into the local Docker daemon —
      # no tar.gz save/upload/download/load steps needed.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Decision Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.postgres
          tags: decision-engine-pg:local
          load: true
          cache-from: |
            type=gha,scope=cypress-${{ github.head_ref || github.ref_name }}
            type=gha,scope=cypress-${{ github.base_ref || 'main' }}
          cache-to: type=gha,scope=cypress-${{ github.head_ref || github.ref_name }},mode=max

      # ── Start services ────────────────────────────────────────────────────
      # Services start in the background while npm installs and UI build run.
      - name: Start services
        run: |
          # host.docker.internal doesn't resolve on Linux CI runners.
          sed -i 's/host = "host.docker.internal"/host = "redis"/' config/docker-configuration.toml
          docker compose --profile postgres-local up -d --no-build

      # ── npm + Cypress binary caches ───────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            package-lock.json

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      # ── Install + build UI (runs while services are coming up) ────────────
      - name: Install UI deps
        run: npm ci
        working-directory: website

      - name: Install Cypress deps
        run: npm ci

      - name: Build UI
        run: npm run build
        working-directory: website
        env:
          # vite preview has no dev proxy, so the API path must be an absolute
          # URL. The default ('/decision-engine-api') only works with the Vite
          # proxy or nginx, neither of which run in CI.
          VITE_API_BASE_PATH: http://localhost:8080

      # ── Wait for API ──────────────────────────────────────────────────────
      # The ready endpoint implies basic health — one check is enough.
      # By this point services have had ~3 min to start while npm ran above.
      - name: Wait for API
        run: |
          timeout 180 bash -c \
            'until curl -sf http://localhost:8080/health/ready; do sleep 3; done' \
            || { echo "❌ API failed to become ready"; docker compose logs --tail=50; exit 1; }
          echo "✓ API ready"

      # ── Serve UI ──────────────────────────────────────────────────────────
      - name: Serve UI
        run: npx vite preview --port 5173 &
        working-directory: website

      - name: Wait for UI
        # Production build base is '/decision-engine/' — check that path, not root.
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:5173/decision-engine/; do sleep 2; done'

      # ── Run all Cypress specs ─────────────────────────────────────────────
      - name: Run Cypress
        run: npx cypress run --spec "cypress/e2e/ui/**/*.cy.js" --headless
        env:
          CYPRESS_API_BASE_URL: http://localhost:8080
          # Include Vite's base path so resolveUiUrl('/routing/rules') builds
          # http://localhost:5173/decision-engine/routing/rules — matching what
          # React Router expects under its '/decision-engine' basename.
          CYPRESS_UI_BASE_URL: http://localhost:5173/decision-engine
          CYPRESS_RUNTIME_MODE: ci

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Cleanup services
        if: always()
        run: docker compose --profile postgres-local down --volumes
