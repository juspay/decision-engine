# Cypress E2E Tests
#
# This workflow runs Cypress tests in parallel across multiple jobs.
# The Decision Engine is built once and shared across all test jobs via
# Docker image artifact to avoid redundant builds.
#
# Architecture:
#   1. Build job: Build Decision Engine from PR source, save as artifact
#   2. Matrix jobs (parallel):
#      - Download the pre-built image
#      - Start API + dependencies via docker compose --profile postgres-local
#      - Build and serve UI from website/ directory (vite preview)
#      - Run single spec file in headless mode
#      - Upload screenshots on failure

name: Cypress E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  IMAGE_NAME: decision-engine-pg:local
  IMAGE_ARTIFACT: decision-engine-image

jobs:
  # ========================================================================
  # Build job: Compile Decision Engine once and share the image
  # ========================================================================
  build:
    name: Build Decision Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Build Decision Engine from PR source
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.postgres
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: |
            type=gha,scope=cypress-${{ github.base_ref || github.ref_name }}
            type=gha,scope=cypress-main
          cache-to: type=gha,scope=cypress-${{ github.base_ref || github.ref_name }},mode=max

      - name: Save Docker image to tar
        run: docker save ${{ env.IMAGE_NAME }} | gzip > ${{ env.IMAGE_ARTIFACT }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT }}
          path: ${{ env.IMAGE_ARTIFACT }}.tar.gz
          retention-days: 1

  # ========================================================================
  # Cypress test jobs: Run in parallel, each with own isolated stack
  # ========================================================================
  cypress:
    name: "cypress / ${{ matrix.spec }}"
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: euclid-rules-builder
            file: cypress/e2e/ui/euclid-rules-builder.cy.js
          - spec: euclid-rules-lifecycle
            file: cypress/e2e/ui/euclid-rules-lifecycle.cy.js
          - spec: euclid-rules-advanced
            file: cypress/e2e/ui/euclid-rules-advanced.cy.js
          - spec: volume-split-page
            file: cypress/e2e/ui/volume-split-page.cy.js
          - spec: dashboard-overview
            file: cypress/e2e/ui/dashboard-overview.cy.js
          - spec: auth-page
            file: cypress/e2e/ui/auth-page.cy.js
          - spec: debit-routing-page
            file: cypress/e2e/ui/debit-routing-page.cy.js
          - spec: decision-explorer
            file: cypress/e2e/ui/decision-explorer.cy.js
          - spec: payment-audit
            file: cypress/e2e/ui/payment-audit.cy.js
          - spec: analytics-page
            file: cypress/e2e/ui/analytics-page.cy.js

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_ARTIFACT }}

      - name: Load Docker image
        run: gunzip -c ${{ env.IMAGE_ARTIFACT }}.tar.gz | docker load

      - name: Start services (using pre-built image)
        run: docker compose --profile postgres-local up -d --no-build

      - name: Debug - Show service status
        run: |
          sleep 5
          docker compose ps
          echo "---"
          docker compose logs --tail=20 open-router-pg-local || true

      - name: Wait for API (basic health)
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:8080/health; do sleep 2; done'
          echo "✓ Basic health check passed"

      - name: Wait for API (ready check)
        run: |
          timeout 180 bash -c \
            'until curl -sf http://localhost:8080/health/ready; do sleep 3; done'
          echo "✓ Ready check passed"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: website

      - name: Build UI
        run: npm run build
        working-directory: website
        env:
          VITE_API_BASE_PATH: http://localhost:8080/decision-engine-api

      - name: Serve UI
        run: npx vite preview --port 5173 &
        working-directory: website

      - name: Wait for UI
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Install Cypress deps
        run: npm ci

      - name: Run ${{ matrix.spec }}
        run: npx cypress run --spec "${{ matrix.file }}" --headless
        env:
          CYPRESS_API_BASE_URL: http://localhost:8080
          CYPRESS_UI_BASE_URL: http://localhost:5173
          CYPRESS_RUNTIME_MODE: ci

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.spec }}
          path: cypress/screenshots/
          retention-days: 7

      - name: Cleanup services
        if: always()
        run: docker compose --profile postgres-local down --volumes
