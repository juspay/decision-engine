name: ci-pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: Install native deps for rdkafka
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: just
          checksum: true
      - run: just clippy

  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  ci-hack:
    name: Cargo Hack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install native deps for rdkafka
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: chmod +x scripts/ci-checks.sh
      - run: just ci_hack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install native deps for rdkafka
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev
      - uses: Swatinem/rust-cache@v2.7.7
      - name: Run unit tests
        run: cargo test

  helm:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for helm-charts changes
        id: helm-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            helm:
              - 'helm-charts/**'

      - name: Install Helm
        if: steps.helm-changes.outputs.helm == 'true'
        uses: azure/setup-helm@v4

      - name: Lint and validate chart
        if: steps.helm-changes.outputs.helm == 'true'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update helm-charts/
          helm lint helm-charts/
          helm template test helm-charts/ > /dev/null
