[log.console]
enabled = true
level = "DEBUG"
log_format = "default"

[server]
host = "127.0.0.1"
port = 8080

[metrics]
host = "127.0.0.1"
port = 9094

[limit]
request_count = 1
duration = 60

[database]
username = "root"
password = "root"
host = "127.0.0.1"
port = 3306
dbname = "jdb"

[pg_database]
pg_username = "db_user"
pg_password = "db_pass"
pg_host = "localhost"
pg_port = 5432
pg_dbname = "decision_engine_db"

[analytics.clickhouse]
user = "decision_engine"
password = "decision_engine"


[redis]
host = "127.0.0.1"
port = 6379
pool_size = 5
reconnect_max_attempts = 5
reconnect_delay = 5
use_legacy_version = false
stream_read_count = 1
auto_pipeline = true
disable_auto_backpressure = false
max_in_flight_commands = 5000
default_command_timeout = 30
unresponsive_timeout = 10
max_feed_count = 200

[cache]
tti = 7200          # i.e. 2 hours
max_capacity = 5000

[cache_config]
service_config_redis_prefix = "DE_service_config_"
service_config_ttl = 300    # 5 minutes

[compression_filepath]
zstd_compression_filepath = "/tmp/extra-paths/redis-zstd-dictionaries/sbx"

[tenant_secrets]
public = { schema = "public" }

