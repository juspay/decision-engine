{{- if .Values.hypersenseEtl.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "decision-engine.hypersenseEtlName" . }}
  labels:
    {{- include "decision-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.hypersenseEtl.metadata.labels.component }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.hypersenseEtl.service.port }}
      protocol: TCP
  selector:
    {{- include "decision-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.hypersenseEtl.metadata.labels.component }}
{{- end }}
