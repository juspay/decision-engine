{{- if .Values.analytics.clickhouse.bootstrap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "decision-engine.analyticsClickhouseConfigName" . }}
  labels:
    {{- include "decision-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics-clickhouse
data:
  000_database.sql: |-
    CREATE DATABASE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }};
  010_api_events.sql: |-
    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_api_events_v1 (
        event_id UInt64,
        tenant_id String,
        merchant_id Nullable(String),
        payment_id Nullable(String),
        api_flow LowCardinality(String),
        created_at_timestamp Int64,
        created_at DateTime64(3, 'UTC') MATERIALIZED fromUnixTimestamp64Milli(created_at_timestamp),
        request_id String,
        latency UInt64,
        status_code Int64,
        auth_type Nullable(String),
        request String,
        user_agent Nullable(String),
        ip_addr Nullable(String),
        url_path String,
        response Nullable(String),
        error Nullable(String),
        event_type LowCardinality(String),
        http_method LowCardinality(String),
        infra_components Nullable(String),
        request_truncated Bool,
        response_truncated Bool
    ) ENGINE = ReplacingMergeTree(event_id)
    PARTITION BY toYYYYMM(created_at)
    ORDER BY (
        tenant_id,
        created_at_timestamp,
        api_flow,
        request_id,
        isNull(merchant_id),
        coalesce(merchant_id, ''),
        isNull(payment_id),
        coalesce(payment_id, ''),
        event_id
    )
    TTL created_at + INTERVAL 18 MONTH;

    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_api_events_parse_errors (
        topic String,
        partition Int64,
        offset Int64,
        raw String,
        error String
    ) ENGINE = MergeTree
    ORDER BY (topic, partition, offset);

    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_api_events_queue (
        schema_version UInt8,
        produced_at_ms Int64,
        event_id UInt64,
        tenant_id String,
        merchant_id Nullable(String),
        payment_id Nullable(String),
        api_flow LowCardinality(String),
        created_at_timestamp Int64,
        request_id String,
        latency UInt64,
        status_code Int64,
        auth_type Nullable(String),
        request String,
        user_agent Nullable(String),
        ip_addr Nullable(String),
        url_path String,
        response Nullable(String),
        error Nullable(String),
        event_type LowCardinality(String),
        http_method LowCardinality(String),
        infra_components Nullable(String),
        request_truncated Bool,
        response_truncated Bool
    ) ENGINE = Kafka
    SETTINGS
        kafka_broker_list = '{{ .Values.analytics.clickhouse.kafkaBrokerList }}',
        kafka_topic_list = '{{ .Values.analytics.kafka.apiTopic }}',
        kafka_group_name = '{{ .Values.analytics.clickhouse.apiConsumerGroup }}',
        kafka_format = 'JSONEachRow',
        kafka_num_consumers = 1,
        kafka_handle_error_mode = 'stream';

    CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_api_events_parse_errors_mv
    TO {{ .Values.analytics.clickhouse.database }}.analytics_api_events_parse_errors AS
    SELECT
        _topic AS topic,
        _partition AS partition,
        _offset AS offset,
        _raw_message AS raw,
        _error AS error
    FROM {{ .Values.analytics.clickhouse.database }}.analytics_api_events_queue
    WHERE length(_error) > 0;

    CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_api_events_mv
    TO {{ .Values.analytics.clickhouse.database }}.analytics_api_events_v1 AS
    SELECT
        event_id,
        tenant_id,
        merchant_id,
        payment_id,
        api_flow,
        created_at_timestamp,
        request_id,
        latency,
        status_code,
        auth_type,
        request,
        user_agent,
        ip_addr,
        url_path,
        response,
        error,
        event_type,
        http_method,
        infra_components,
        request_truncated,
        response_truncated
    FROM {{ .Values.analytics.clickhouse.database }}.analytics_api_events_queue
    WHERE length(_error) = 0;
  020_domain_events.sql: |-
    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_v1 (
        event_id UInt64,
        tenant_id String,
        event_type LowCardinality(String),
        merchant_id Nullable(String),
        payment_id Nullable(String),
        request_id Nullable(String),
        payment_method_type Nullable(String),
        payment_method Nullable(String),
        card_network Nullable(String),
        card_is_in Nullable(String),
        currency Nullable(String),
        country Nullable(String),
        auth_type Nullable(String),
        gateway Nullable(String),
        event_stage Nullable(String),
        routing_approach Nullable(String),
        rule_name Nullable(String),
        status Nullable(String),
        error_code Nullable(String),
        error_message Nullable(String),
        score_value Nullable(Float64),
        sigma_factor Nullable(Float64),
        average_latency Nullable(Float64),
        tp99_latency Nullable(Float64),
        transaction_count Nullable(Int64),
        route Nullable(String),
        details Nullable(String),
        created_at_ms Int64,
        created_at DateTime64(3, 'UTC') MATERIALIZED fromUnixTimestamp64Milli(created_at_ms)
    ) ENGINE = ReplacingMergeTree(event_id)
    PARTITION BY toYYYYMM(created_at)
    ORDER BY (
        tenant_id,
        isNull(merchant_id),
        coalesce(merchant_id, ''),
        created_at_ms,
        event_type,
        isNull(route),
        coalesce(route, ''),
        isNull(request_id),
        coalesce(request_id, ''),
        isNull(payment_id),
        coalesce(payment_id, ''),
        event_id
    )
    TTL created_at + INTERVAL 18 MONTH;

    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_parse_errors (
        topic String,
        partition Int64,
        offset Int64,
        raw String,
        error String
    ) ENGINE = MergeTree
    ORDER BY (topic, partition, offset);

    CREATE TABLE IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_queue (
        schema_version UInt8,
        produced_at_ms Int64,
        event_id UInt64,
        tenant_id String,
        event_type LowCardinality(String),
        merchant_id Nullable(String),
        payment_id Nullable(String),
        request_id Nullable(String),
        payment_method_type Nullable(String),
        payment_method Nullable(String),
        card_network Nullable(String),
        card_is_in Nullable(String),
        currency Nullable(String),
        country Nullable(String),
        auth_type Nullable(String),
        gateway Nullable(String),
        event_stage Nullable(String),
        routing_approach Nullable(String),
        rule_name Nullable(String),
        status Nullable(String),
        error_code Nullable(String),
        error_message Nullable(String),
        score_value Nullable(Float64),
        sigma_factor Nullable(Float64),
        average_latency Nullable(Float64),
        tp99_latency Nullable(Float64),
        transaction_count Nullable(Int64),
        route Nullable(String),
        details Nullable(String),
        created_at_ms Int64
    ) ENGINE = Kafka
    SETTINGS
        kafka_broker_list = '{{ .Values.analytics.clickhouse.kafkaBrokerList }}',
        kafka_topic_list = '{{ .Values.analytics.kafka.domainTopic }}',
        kafka_group_name = '{{ .Values.analytics.clickhouse.domainConsumerGroup }}',
        kafka_format = 'JSONEachRow',
        kafka_num_consumers = 1,
        kafka_handle_error_mode = 'stream';

    CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_parse_errors_mv
    TO {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_parse_errors AS
    SELECT
        _topic AS topic,
        _partition AS partition,
        _offset AS offset,
        _raw_message AS raw,
        _error AS error
    FROM {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_queue
    WHERE length(_error) > 0;

    CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_mv
    TO {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_v1 AS
    SELECT
        event_id,
        tenant_id,
        event_type,
        merchant_id,
        payment_id,
        request_id,
        payment_method_type,
        payment_method,
        card_network,
        card_is_in,
        currency,
        country,
        auth_type,
        gateway,
        event_stage,
        routing_approach,
        rule_name,
        status,
        error_code,
        error_message,
        score_value,
        sigma_factor,
        average_latency,
        tp99_latency,
        transaction_count,
        route,
        details,
        created_at_ms
    FROM {{ .Values.analytics.clickhouse.database }}.analytics_domain_events_queue
    WHERE length(_error) = 0;
{{- end }}
