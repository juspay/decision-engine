{{- if and (or .Values.hypersenseBackend.enabled .Values.hypersenseEtl.enabled) .Values.hypersenseShared.create -}}
# Shared secret for the Hypersense backend + etl services (DB password).
# Mirrors the external Secret referenced by the hypersense-main chart; the
# deployments consume DB_PASSWD via secretKeyRef. Set hypersenseShared.create to
# false and point hypersenseShared.secretName at your own Secret to use an
# externally-managed one instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "decision-engine.hypersenseSecretName" . }}
  labels:
    {{- include "decision-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The hypersense app reads DB_PASSWD with is_encoded=True and base64-decodes it
  # itself (Configs/AppConfigs.py, when RUNNING_ENV=LOCAL or IS_EC2=TRUE), so the
  # value delivered to the container must be base64-encoded. Do NOT remove b64enc.
  DB_PASSWD: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
