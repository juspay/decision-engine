events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream decision_engine {
        server decision-engine-api:8080;
    }

    upstream mintlify_docs {
        server mintlify-docs:3000;
    }

    server {
        listen 80;

        # Mintlify Next.js static assets — must be proxied to the docs server
        location /_next/ {
            proxy_pass http://mintlify_docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Mintlify docs routes. Keep these explicit so API paths such as
        # /health and /routing/* continue to proxy to Decision Engine.
        location ~* ^/(api-reference|api-refs|introduction|installation|local-setup|configuration|dashboard-guide|dual-protocol-layer|setup-guide-postgres|setup-guide-mysql|analytics|payment-audit|clickhouse-analytics|favicon|logo)(/|$) {
            proxy_pass http://mintlify_docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Redirect legacy dashboard paths to the production dashboard prefix.
        location = /dashboard {
            return 301 /decision-engine/;
        }

        location /dashboard/ {
            return 301 /decision-engine/;
        }

        location = /decision-engine {
            return 301 /decision-engine/;
        }

        # Production dashboard API proxy. A browser hosted at
        # /decision-engine/* calls /decision-engine/api/*, which is stripped
        # before forwarding to the Decision Engine backend.
        location /decision-engine/api/ {
            proxy_pass http://decision_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dashboard SPA (React app served from static files)
        location /decision-engine/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /decision-engine/index.html;
        }

        # Decision Engine API
        location / {
            proxy_pass http://decision_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
