services:
  # ==========================================
  # Decision Engine Runtime (GHCR Images)
  # ==========================================
  open-router-pg-ghcr:
    image: ghcr.io/juspay/decision-engine/postgres:${DECISION_ENGINE_TAG:-v1.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9094:9094"
      - "9094:9094"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator-postgres:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-local:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - decision-engine-open-router-local:latest
      labels:
        - "com.docker.compose.watchfile=Dockerfile"
        - "com.docker.compose.watchfile=src/"
        - "com.docker.compose.watchfile=Cargo.toml"
        - "com.docker.compose.watchfile=Cargo.lock"
    image: decision-engine-open-router-local:latest
    platform: linux/amd64
    container_name: open-router-local
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      groovy-runner-local:
        condition: service_healthy
      routing-config:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      - open-router-network
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-local-pg:
    build:
      context: .
      dockerfile: Dockerfile.postgres
      cache_from:
        - decision-engine-open-router-local-pg:latest
      labels:
        - "com.docker.compose.watchfile=Dockerfile.postgres"
        - "com.docker.compose.watchfile=src/"
        - "com.docker.compose.watchfile=Cargo.toml"
        - "com.docker.compose.watchfile=Cargo.lock"
    image: decision-engine-open-router-local-pg:latest
    platform: linux/amd64
    container_name: open-router-local-pg
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator-postgres:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      - open-router-network
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-mysql-ghcr:
    image: ghcr.io/juspay/decision-engine:${DECISION_ENGINE_TAG:-v1.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-config:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  # ==========================================
  # Decision Engine Runtime (Local Build)
  # ==========================================
  open-router-pg-local:
    build:
      context: .
      dockerfile: Dockerfile.postgres
      platforms:
        - linux/amd64
    image: decision-engine-pg:local
    platform: linux/amd64
    profiles:
      - postgres-local
      - dashboard-postgres-local
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9094:9094"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator-postgres:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-mysql-local:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: decision-engine-mysql:local
    platform: linux/amd64
    profiles:
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-config:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  # ==========================================
  # Dashboard and Docs
  # ==========================================
  nginx:
    image: nginx:alpine
    profiles:
      - dashboard-postgres-ghcr
      - dashboard-postgres-local
      - dashboard-mysql-ghcr
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./website/dist:/usr/share/nginx/html/dashboard:ro
    depends_on:
      mintlify-docs:
        condition: service_healthy
    networks:
      - open-router-network

  mintlify-docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    profiles:
      - dashboard-postgres-ghcr
      - dashboard-postgres-local
      - dashboard-mysql-ghcr
      - dashboard-mysql-local
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==========================================
  # Supporting Services
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    networks:
      - open-router-network
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    networks:
      - open-router-network
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./config/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yml

  groovy-runner-ghcr:
    image: ghcr.io/juspay/decision-engine/groovy-runner:${GROOVY_RUNNER_TAG:-v1.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - groovy-ghcr
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  groovy-runner-local:
    build:
      context: .
      dockerfile: groovy.Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - decision-engine-groovy-runner-local:latest
      labels:
        - "com.docker.compose.watchfile=groovy.Dockerfile"
        - "com.docker.compose.watchfile=src/Runner.groovy"
    image: decision-engine-groovy-runner:local
    platform: linux/amd64
    profiles:
      - groovy-local
    container_name: groovy-runner-local
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Core Infrastructure
  # ==========================================
  mysql:
    image: mysql:8.0
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jdb
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgresql:
    image: postgres:16
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
    restart: unless-stopped
    container_name: postgres-db
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_pass
      POSTGRES_DB: decision_engine_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d decision_engine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  db-migrator:
    image: mysql:8.0
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "for sql_file in $$(find /app/migrations -name 'up.sql' -type f | sort); do echo \"Running migration: $$sql_file\"; mysql -h mysql -uroot -proot jdb < \"$$sql_file\"; done"]
    networks:
      - open-router-network

  db-migrator-postgres:
    image: rust:latest
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
    container_name: db-migrator-postgres 
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - PGPASSWORD=db_pass
      - DATABASE_URL=postgresql://db_user:db_pass@postgresql:5432/decision_engine_db
    volumes:
      - .:/app
    working_dir: /app
    command: "bash -c 'cargo install diesel_cli --no-default-features --features postgres && diesel migration run --database-url \"$$DATABASE_URL\" --migration-dir /app/migrations_pg --config-file /app/diesel_pg.toml'"
    networks:
      - open-router-network

  routing-config:
    image: python:3.10-slim
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./routing-config:/app
    working_dir: /app
    command: bash run_setup.sh
    networks:
      - open-router-network

  # Analytics Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    platform: linux/amd64
    container_name: open-router-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - open-router-network
    profiles:
      - analytics

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    platform: linux/amd64
    container_name: open-router-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - open-router-network
    profiles:
      - analytics
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    platform: linux/amd64
    container_name: open-router-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: decision_engine_analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_pass
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./analytics/clickhouse/init:/docker-entrypoint-initdb.d
    networks:
      - open-router-network
    depends_on:
      - kafka
      - zookeeper
    profiles:
      - analytics
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-migrator:
    image: clickhouse/clickhouse-server:latest
    platform: linux/amd64
    container_name: analytics-migrator
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./analytics:/analytics
    working_dir: /analytics
    command: sh /analytics/run_migrations.sh
    networks:
      - open-router-network
    profiles:
      - analytics

networks:
  open-router-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  postgres-data:
  clickhouse-data:
