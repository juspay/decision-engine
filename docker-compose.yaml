services:
  # ==========================================
  # Decision Engine Runtime (GHCR Images)
  # ==========================================
  open-router-pg-ghcr:
    image: ghcr.io/juspay/decision-engine/postgres:${DECISION_ENGINE_TAG:-v1.3.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9094:9094"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator-postgres:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-mysql-ghcr:
    image: ghcr.io/juspay/decision-engine:${DECISION_ENGINE_TAG:-v1.3.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-config:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  # ==========================================
  # Decision Engine Runtime (Local Build)
  # ==========================================
  open-router-pg-local:
    build:
      context: .
      dockerfile: Dockerfile.postgres
      platforms:
        - linux/amd64
    image: decision-engine-pg:local
    platform: linux/amd64
    profiles:
      - postgres-local
      - dashboard-postgres-local
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9094:9094"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator-postgres:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  open-router-mysql-local:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: decision-engine-mysql:local
    platform: linux/amd64
    profiles:
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-config:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-configuration.toml:/local/config/development.toml
    networks:
      open-router-network:
        aliases:
          - decision-engine-api
    environment:
      - GROOVY_RUNNER_HOST=host.docker.internal:8085

  # ==========================================
  # Dashboard and Docs
  # ==========================================
  nginx:
    image: nginx:alpine
    profiles:
      - dashboard-postgres-ghcr
      - dashboard-postgres-local
      - dashboard-mysql-ghcr
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./website/dist:/usr/share/nginx/html/dashboard:ro
    depends_on:
      mintlify-docs:
        condition: service_healthy
    networks:
      - open-router-network

  mintlify-docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    profiles:
      - dashboard-postgres-ghcr
      - dashboard-postgres-local
      - dashboard-mysql-ghcr
      - dashboard-mysql-local
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==========================================
  # Supporting Services
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    networks:
      - open-router-network
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    networks:
      - open-router-network
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./config/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yml

  groovy-runner-ghcr:
    image: ghcr.io/juspay/decision-engine/groovy-runner:${GROOVY_RUNNER_TAG:-v1.3.4}
    pull_policy: always
    platform: linux/amd64
    profiles:
      - groovy-ghcr
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  groovy-runner-local:
    build:
      context: .
      dockerfile: groovy.Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - decision-engine-groovy-runner-local:latest
      labels:
        - "com.docker.compose.watchfile=groovy.Dockerfile"
        - "com.docker.compose.watchfile=src/Runner.groovy"
    image: decision-engine-groovy-runner:local
    platform: linux/amd64
    profiles:
      - groovy-local
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Core Infrastructure
  # ==========================================
  mysql:
    image: mysql:8.0
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jdb
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgresql:
    image: postgres:16
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_pass
      POSTGRES_DB: decision_engine_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d decision_engine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - open-router-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  db-migrator:
    image: mysql:8.0
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "for sql_file in $$(find /app/migrations -name 'up.sql' -type f | sort); do echo \"Running migration: $$sql_file\"; mysql -h mysql -uroot -proot jdb < \"$$sql_file\"; done"]
    networks:
      - open-router-network

  db-migrator-postgres:
    image: rust:latest
    profiles:
      - postgres-ghcr
      - dashboard-postgres-ghcr
      - postgres-local
      - dashboard-postgres-local
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - PGPASSWORD=db_pass
      - DATABASE_URL=postgresql://db_user:db_pass@postgresql:5432/decision_engine_db
    volumes:
      - .:/app
    working_dir: /app
    command: "bash -c 'cargo install diesel_cli --no-default-features --features postgres && diesel migration run --database-url \"$$DATABASE_URL\" --migration-dir /app/migrations_pg --config-file /app/diesel_pg.toml'"
    networks:
      - open-router-network

  routing-config:
    image: python:3.10-slim
    profiles:
      - mysql-ghcr
      - dashboard-mysql-ghcr
      - mysql-local
      - dashboard-mysql-local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./routing-config:/app
    working_dir: /app
    command: bash run_setup.sh
    networks:
      - open-router-network

networks:
  open-router-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  postgres-data:
